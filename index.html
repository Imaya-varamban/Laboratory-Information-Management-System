<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LIMS</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <header>
      <h1>Labaratory Information Management System [LIMS]</h1>
    </header>
  

    <!-- Login Credentials  -->
    <form action="" class="bg">
      <div>
        <label for="login-email">Email:</label>
        <input type="email" name="email" id="login-email" required />
      </div>

      <div>
        <label for="login-password">Password : </label>
        <input type="password" name="password" id="login-password" required />
      </div>
      <button>Login</button>
    </form>
    <br />
    <span
      >Unable to Login?
      <a href="mailto:support@example.net">Contact Admin</a></span
    ><br />
    <span
      >To Proceed to
      <a href="./sample-registration.html">Workbench Page</a></span
    >
  </body>
